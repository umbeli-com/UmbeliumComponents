name: Publish Packages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@umbeli-com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        run: |
          for package_dir in packages/ui packages/auth packages/layout packages/billing; do
            package_name=$(node -p "require('./${package_dir}/package.json').name")
            package_version=$(node -p "require('./${package_dir}/package.json').version")

            if npm view "${package_name}@${package_version}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; version already exists."
              continue
            fi

            (
              cd "${package_dir}"
              pnpm publish --no-git-checks
            )
          done
